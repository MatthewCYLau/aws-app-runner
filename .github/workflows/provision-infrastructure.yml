name: Provision AWS infrastructure

on:
  push:
    branches:
      - main
    paths:
      - "terraform/app/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TF_APP_WORKDIR: ./terraform/app

jobs:
  terraform-plan:
    name: "Terraform plan"
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write"
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_APP_WORKDIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.IAM_ROLE_ARN }}
          aws-region: us-east-1
      - name: Set-up SSH public key
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_PUBLIC_KEY" > ~/.ssh/aws_app.pub
        env:
          SSH_PUBLIC_KEY: ${{secrets.SSH_PUBLIC_KEY}}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: terraform init
      - name: Terraform test
        run: terraform test
      - name: Terraform Plan
        run: terraform plan -out=terraform.tfplan
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          path: ${{ env.TF_APP_WORKDIR }}/terraform.tfplan
          name: artifact
  terraform-apply:
    name: "Terraform apply"
    runs-on: ubuntu-latest
    needs: terraform-plan
    environment:
      name: production
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_APP_WORKDIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - uses: actions/download-artifact@v4
        with:
          name: artifact
          path: ${{ env.TF_APP_WORKDIR }}
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.IAM_ROLE_ARN }}
          aws-region: us-east-1
      - name: Set-up SSH public key
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_PUBLIC_KEY" > ~/.ssh/aws_app.pub
        env:
          SSH_PUBLIC_KEY: ${{secrets.SSH_PUBLIC_KEY}}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: terraform init
      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve terraform.tfplan
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
